<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <title>To‑Do Board</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="board">
      <h2>To‑Do Board</h2>

      <div class="inputRow">
        <!-- Input field for new tasks -->
        <input id="newTask" type="text" placeholder="Neue Aufgabe..." />

        <!-- Button to add a new task -->
        <button id="addBtn">Hinzufügen</button>
      </div>

      <!-- List where tasks will be displayed -->
      <ul id="taskList"></ul>
    </div>
    <script src="script.js"></script>
  </body>
</html>
